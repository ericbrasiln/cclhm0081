name: Render Quarto Documents

on:
  push:
    branches: [main]
    paths:
      - "ementa/ementa.md"
      - "ementa/calendario.md"
      - "index.md"
      - "noticias/**.md"
      - "bibliografia/apoio/**_questoes-apoio.md"
  pull_request:
    branches: [main]
    paths:
      - "ementa/ementa.md"
      - "ementa/calendario.md"
      - "index.md"
      - "noticias/**.md"
      - "bibliografia/apoio/**_questoes-apoio.md"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Renderizar documentos fixos
        run: |
          quarto render ementa/ementa.md
          quarto render ementa/calendario.md
          quarto render index.md

      - name: Renderizar notícias
        run: |
          shopt -s nullglob
          for f in noticias/*.md; do
            echo "Renderizando $f"
            quarto render "$f"
          done

      - name: Renderizar questões de apoio
        run: |
          shopt -s nullglob
          for f in bibliografia/apoio/*_questoes-apoio.md; do
            echo "Renderizando $f"
            quarto render "$f"
          done

      - name: Commit e push dos arquivos renderizados
        if: github.event_name == 'push'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            ementa/ementa.html ementa/ementa.pdf \
            ementa/calendario.html ementa/calendario.pdf \
            index.html \
            noticias/*.html noticias/*.pdf \
            bibliografia/apoio/*.pdf \
            --ignore-errors
          git diff --staged --quiet || \
            git commit -m "chore: render automático via GitHub Actions [skip ci]"
          git push
